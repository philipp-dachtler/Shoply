<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="icons/favicon.png">
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <title>Einkaufsliste</title>
</head>
<body>
    <div class="container">
        <h1>🛒 Einkaufsliste</h1>
        <input type="text" id="itemInput" placeholder="Neues Produkt..." autofocus />
        <div class="button-group">
            <button onclick="addItem()" class="primary">Hinzufügen</button>
            <button id="shareLinkBtn" class="secondary">Liste teilen 🔗</button>
            <button id="removeListItems" onclick="clearList()" class="danger">Alles löschen</button>
        </div>
        <ul id="shoppingList"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
