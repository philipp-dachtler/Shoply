<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <title>Meine Einkaufsliste</title>
</head>
<body>
    <div class="container">
        <h1>🛒 Einkaufsliste</h1>
        <input type="text" id="itemInput" placeholder="Neues Produkt..." autofocus />
        <button onclick="addItem()">Hinzufügen</button>
        <ul id="shoppingList"></ul>
        <button id="shareLinkBtn">Liste teilen 🔗</button>
        <button onclick="clearList()" class="danger">Alles löschen</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
